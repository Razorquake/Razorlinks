spring.application.name=razorlinks

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.properties.hibernate.dialect=${DATABASE_DIALECT}
spring.jpa.hibernate.ddl-auto=update

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

frontend.url=${FRONTEND_URL}
subdomain.url=${SUBDOMAIN_URL}

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_ADDRESS}
spring.mail.password=${APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#GitHub OAuth2 configuration
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
admin.email=${EMAIL_ADDRESS}
admin.password=${EMAIL_PASSWORD}
server.port=${SERVER_PORT}
spring.profiles.active=${SPRING_PROFILE:prod}

# Rate Limiting Configuration
# Public auth endpoints (per IP)
rate-limit.auth.capacity=${RATE_LIMIT_AUTH_CAPACITY:10}
rate-limit.auth.refill-tokens=${RATE_LIMIT_AUTH_REFILL_TOKENS:10}
rate-limit.auth.refill-duration-seconds=${RATE_LIMIT_AUTH_REFILL_DURATION:60}

# Redirect endpoint (per IP)
rate-limit.redirect.capacity=${RATE_LIMIT_REDIRECT_CAPACITY:90}
rate-limit.redirect.refill-tokens=${RATE_LIMIT_REDIRECT_REFILL_TOKENS:90}
rate-limit.redirect.refill-duration-seconds=${RATE_LIMIT_REDIRECT_REFILL_DURATION:60}

# Authenticated API endpoints (per username)
rate-limit.authenticated.capacity=${RATE_LIMIT_AUTHENTICATED_CAPACITY:30}
rate-limit.authenticated.refill-tokens=${RATE_LIMIT_AUTHENTICATED_REFILL_TOKENS:30}
rate-limit.authenticated.refill-duration-seconds=${RATE_LIMIT_AUTHENTICATED_REFILL_DURATION:60}

# Redis Configuration
spring.cache.type=redis
spring.cache.cache-names=redirects

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}

# Add only if your AWS Redis uses AUTH:
spring.data.redis.username=${REDIS_USERNAME:}
spring.data.redis.password=${REDIS_PASSWORD:}

springdoc.swagger-ui.path=/api/api-docs
springdoc.api-docs.path=/api/api-docs
